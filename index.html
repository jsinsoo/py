<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>파이썬 10단계 학습 상단 메뉴 INDEX</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{box-sizing:border-box}
html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:"Malgun Gothic","Apple SD Gothic Neo",Arial,sans-serif;
  background:#f8fbff;
}
.top{
  height:92px;
  background:linear-gradient(135deg,#0f3b8f,#2563eb,#7c3aed);
  color:white;
  display:grid;
  grid-template-rows:42px 50px;
  box-shadow:0 8px 24px rgba(15,23,42,.24);
  z-index:10;
  position:relative;
}
.titlebar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 18px;
  border-bottom:1px solid rgba(255,255,255,.16);
}
.brand{
  display:flex;
  align-items:center;
  gap:9px;
  min-width:0;
}
.logo{
  width:30px;
  height:30px;
  border-radius:10px;
  background:#facc15;
  display:grid;
  place-items:center;
  font-size:20px;
}
.brand h1{
  margin:0;
  font-size:19px;
  white-space:nowrap;
}
.current{
  font-size:13px;
  color:#dbeafe;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  max-width:45vw;
}
.actions{
  display:flex;
  gap:8px;
}
.actions button,.actions a{
  border:1px solid rgba(255,255,255,.35);
  background:rgba(255,255,255,.12);
  color:white;
  padding:6px 10px;
  border-radius:10px;
  font-weight:800;
  font-size:12px;
  cursor:pointer;
  text-decoration:none;
}
.actions button:hover,.actions a:hover{background:rgba(255,255,255,.24)}
.menu{
  display:flex;
  align-items:center;
  gap:7px;
  padding:7px 12px;
  overflow-x:auto;
  overflow-y:hidden;
}
.menu button{
  flex:0 0 auto;
  border:1px solid rgba(255,255,255,.28);
  background:rgba(255,255,255,.13);
  color:white;
  border-radius:999px;
  padding:8px 12px;
  cursor:pointer;
  font-weight:800;
  font-size:13px;
  white-space:nowrap;
  transition:.18s;
}
.menu button:hover{
  background:rgba(255,255,255,.25);
  transform:translateY(-1px);
}
.menu button.active{
  background:#ffffff;
  color:#1d4ed8;
  border-color:white;
}
.viewerBox{
  width:100vw;
  height:calc(100vh - 92px);
  background:white;
  position:relative;
}
iframe{
  width:100%;
  height:100%;
  border:0;
  display:block;
  background:white;
}
.empty{
  position:absolute;
  inset:0;
  display:grid;
  place-items:center;
  text-align:center;
  background:linear-gradient(135deg,#eff6ff,#f5f3ff,#fff7ed);
  padding:30px;
}
.empty.hide{display:none}
.empty h2{
  margin:0 0 10px;
  font-size:34px;
  color:#1d4ed8;
}
.empty p{
  margin:0;
  color:#334155;
  line-height:1.7;
  font-size:17px;
}
@media(max-width:700px){
  .top{height:108px;grid-template-rows:50px 58px}
  .titlebar{align-items:flex-start;flex-direction:column;justify-content:center;gap:3px}
  .current{max-width:90vw}
  .actions{position:absolute;right:10px;top:10px}
  .viewerBox{height:calc(100vh - 108px)}
}
</style>
</head>
<body>
<header class="top">
  <div class="titlebar">
    <div class="brand">
      <div class="logo">🐍</div>
      <h1>파이썬 10단계 학습</h1>
      <span class="current" id="current">py01.html</span>
    </div>
    <div class="actions">
      <button onclick="reloadFrame()">🔄 새로고침</button>
      <a href="py01.html" id="newTab" target="_blank">↗ 새 창</a>
    </div>
  </div>
  <nav class="menu" id="menu"></nav>
</header>

<main class="viewerBox">
  <div class="empty" id="empty">
    <div>
      <h2>파이썬 10단계 학습</h2>
      <p>위쪽의 간단 메뉴에서 <b>py01.html ~ py10.html</b>을 선택하면<br>아래 전체 화면에 학습 자료가 열립니다.</p>
    </div>
  </div>
  <iframe id="viewer" title="Python lesson viewer"></iframe>
</main>

<script>
const lessons=[
  ["py01.html","01 기초문법"],
  ["py02.html","02 조건/반복"],
  ["py03.html","03 자료구조"],
  ["py04.html","04 함수/모듈"],
  ["py05.html","05 파일/예외"],
  ["py06.html","06 OOP"],
  ["py07.html","07 알고리즘"],
  ["py08.html","08 고급문법"],
  ["py09.html","09 데이터/AI"],
  ["py10.html","10 프로젝트"]
];

const menu=document.getElementById("menu");
let currentFile="py01.html";

lessons.forEach((lesson,i)=>{
  const btn=document.createElement("button");
  btn.textContent=lesson[1];
  btn.onclick=()=>openLesson(i);
  menu.appendChild(btn);
});

function openLesson(i){
  currentFile=lessons[i][0];
  document.querySelectorAll(".menu button").forEach(b=>b.classList.remove("active"));
  document.querySelectorAll(".menu button")[i].classList.add("active");
  document.getElementById("empty").classList.add("hide");
  document.getElementById("viewer").src=currentFile;
  document.getElementById("current").textContent=lessons[i][1]+" · "+currentFile;
  document.getElementById("newTab").href=currentFile;
}
function reloadFrame(){
  document.getElementById("viewer").src=currentFile;
}
openLesson(0);
</script>
</body>
</html>
